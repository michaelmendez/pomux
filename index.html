        "applicationSubCategory": "TimeManagementApplication",

        "browserRequirements": "Requires a modern web browser with JavaScript enabled.",
        "inLanguage": "en",
        "isAccessibleForFree": true,
        "offers": {

          "price": "0",
          "priceCurrency": "USD"

        "screenshot": "https://pomux.xyz/og-image.png",
        "featureList": [
          "25-minute Pomodoro focus timer",
          "5-minute short break timer",
          "15-minute long break timer",
          "Automatic session counter with localStorage persistence",
          "Desktop & browser sound notifications at session end",
          "Daily motivational quotes to keep you inspired",
          "Built-in synthwave radio player",
          "Fully offline capable with Service Worker",
          "Progressive Web App (PWA) — installable on any device",
          "Minimal, distraction-free modern design",
          "Customizable timer settings",
          "No account or signup required — completely free"
        ],
        "keywords": "pomodoro timer, focus timer, productivity timer, study timer, synthwave radio, minimal timer, modern timer, free pomodoro, pwa timer",

    <!-- JSON-LD: FAQPage (triggers Google rich snippets / featured snippets) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is the Pomodoro Technique?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The Pomodoro Technique is a time management method that breaks work into 25-minute focused sessions called 'Pomodoros', separated by short 5-minute breaks. After every 4 Pomodoros you take a longer 15-minute break. It helps improve focus, reduce mental fatigue, and boost productivity."
            }
          },
          {
            "@type": "Question",
            "name": "How long is a Pomodoro session?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A standard Pomodoro session lasts 25 minutes. After each session, you take a 5-minute short break. After completing 4 Pomodoros, you take a longer 15-minute break. Pomux lets you customize these durations to fit your workflow."
            }
          },
          {
            "@type": "Question",
            "name": "Is Pomux free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, Pomux is completely free to use. There is no account, no subscription, and no hidden fees. Simply visit the website and start your first Pomodoro timer immediately."
            }
          },
          {
            "@type": "Question",
            "name": "Does Pomux work offline?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Pomux is a Progressive Web App (PWA) with full offline support via a Service Worker. You can install it on your desktop or mobile device and use it without an internet connection."
            }
          },
          {
            "@type": "Question",
            "name": "Can I listen to music while using Pomux?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! Pomux has a built-in synthwave radio player. You can listen to focus-enhancing music directly inside the app while your Pomodoro timer runs — no separate tab needed."
            }
          },
          {
            "@type": "Question",
            "name": "Does Pomux send notifications when the timer ends?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Pomux plays a sound and can send a browser desktop notification when each Pomodoro or break session ends, so you never miss a transition even if you switch tabs."
            }
          },
          {
            "@type": "Question",
            "name": "Can I install Pomux on my phone or desktop?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Pomux is a Progressive Web App (PWA) and can be installed directly from your browser on Android, iOS, Windows, and macOS — no app store required. It works like a native app."
            }
          }
        ]
      }
